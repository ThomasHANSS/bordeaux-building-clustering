<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clustering bâtiments — Bordeaux Métropole</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; background: #ffffff; }

#panel {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    width: 340px; max-height: calc(100vh - 20px); overflow-y: auto;
    font-size: 13px;
}
#panel-header {
    position: sticky; top: 0; z-index: 10;
    padding: 10px 16px; background: #1a1a2e; color: white;
    border-radius: 8px 8px 0 0; font-weight: bold; font-size: 14px;
    cursor: pointer; user-select: none; display: flex; justify-content: space-between;
}
#panel-header:hover { background: #16213e; }
#panel-body { padding: 0; }
.section { padding: 10px 14px; border-bottom: 1px solid #eee; }
.section-title { font-weight: 600; font-size: 11px; color: #888; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px; }

/* Tabs */
#tabs {
    display: flex; border-bottom: 2px solid #eee; background: #fafafa;
}
.tab {
    flex: 1; padding: 10px 8px; text-align: center; cursor: pointer;
    font-size: 12px; font-weight: 600; color: #666; border-bottom: 3px solid transparent;
    transition: all 0.2s;
}
.tab:hover { background: #f0f0f0; }
.tab.active { color: #1a1a2e; border-bottom-color: #4363d8; background: white; }
#version-subtitle { padding: 6px 14px; font-size: 11px; color: #888; background: #f8f8f8;
    border-bottom: 1px solid #eee; }

.basemap-option { display: flex; align-items: center; padding: 3px 0; cursor: pointer; }
.basemap-option input { margin-right: 8px; cursor: pointer; }
.basemap-option label { cursor: pointer; font-size: 12px; }

.cluster-option { display: flex; align-items: center; padding: 3px 0; cursor: pointer; }
.cluster-option input { margin-right: 6px; flex-shrink: 0; cursor: pointer; }
.cluster-swatch {
    width: 14px; height: 14px; border-radius: 3px; margin-right: 6px;
    border: 1px solid #333; flex-shrink: 0;
}
.cluster-label { font-size: 11px; line-height: 1.3; }
.cluster-count { color: #999; font-size: 10px; }

.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px;
    background: #f8f8f8; cursor: pointer; font-size: 11px; }
.btn:hover { background: #e8e8e8; }

#loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2000; background: rgba(0,0,0,0.85); color: white; padding: 20px 30px;
    border-radius: 10px; font-size: 16px; text-align: center;
}
#progress { color: #42d4f4; }
#load-bar { width: 200px; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; }
#load-fill { height: 100%; width: 0%; background: #42d4f4; border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>
<div id="map"></div>
<div id="loading">
    Chargement... <span id="progress">0/0</span>
    <div id="load-bar"><div id="load-fill"></div></div>
</div>

<div id="panel">
    <div id="panel-header">
        <span>Clustering — Bordeaux Métropole</span>
        <span id="toggle-icon">&#9660;</span>
    </div>
    <div id="panel-body">
        <div id="tabs"></div>
        <div id="version-subtitle"></div>
        <div class="section">
            <div class="section-title">Fond de carte</div>
            <div id="basemap-controls"></div>
        </div>
        <div class="section">
            <div class="section-title" id="clusters-title">Clusters</div>
            <div class="btn-row">
                <button class="btn" onclick="toggleAll(true)">Tout afficher</button>
                <button class="btn" onclick="toggleAll(false)">Tout masquer</button>
            </div>
            <div id="cluster-controls" style="margin-top:8px;"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const VERSIONS = {"v3": {"title": "Clustering v3 — Résidentiel individuel", "subtitle": "150k bâtiments, KMeans k=15", "n_total": 150119, "clusters": {"0": {"name": "Pavillon / 116m² / 4m / fin XXe / brique", "color": "#e6194b", "count": 18165, "file": "data/v3_cluster_0.geojson"}, "1": {"name": "Pavillon / 146m² / 4m / 1945-75 / brique", "color": "#3cb44b", "count": 7562, "file": "data/v3_cluster_1.geojson"}, "2": {"name": "Pavillon / 136m² / 4m / fin XXe / brique", "color": "#ffe119", "count": 43279, "file": "data/v3_cluster_2.geojson"}, "3": {"name": "Maison R+1 / 85m² / 7m / ancien / pierre", "color": "#4363d8", "count": 12560, "file": "data/v3_cluster_3.geojson"}, "4": {"name": "Maison R+1 / 498m² / 5m / ancien / brique", "color": "#f58231", "count": 66, "file": "data/v3_cluster_4.geojson"}, "5": {"name": "Pavillon / 111m² / 4m / 1945-75 / parpaing", "color": "#911eb4", "count": 13169, "file": "data/v3_cluster_5.geojson"}, "6": {"name": "Grande maison / 239m² / 4m / 1945-75", "color": "#42d4f4", "count": 101, "file": "data/v3_cluster_6.geojson"}, "7": {"name": "Maison R+1 / 232m² / 6m / ancien", "color": "#f032e6", "count": 33, "file": "data/v3_cluster_7.geojson"}, "8": {"name": "Maison R+1 / 159m² / 5m / 1945-75 / brique", "color": "#bfef45", "count": 3955, "file": "data/v3_cluster_8.geojson"}, "9": {"name": "Maison R+1 / 92m² / 5m / ancien / pierre", "color": "#fabed4", "count": 18073, "file": "data/v3_cluster_9.geojson"}, "10": {"name": "Maison R+1 / 82m² / 6m / 1945-75 / parpaing", "color": "#469990", "count": 10888, "file": "data/v3_cluster_10.geojson"}, "11": {"name": "Grande maison / 217m² / 4m / 1945-75 / brique", "color": "#dcbeff", "count": 495, "file": "data/v3_cluster_11.geojson"}, "12": {"name": "Maison R+1 / 94m² / 6m / fin XXe / brique", "color": "#9A6324", "count": 16935, "file": "data/v3_cluster_12.geojson"}, "13": {"name": "Individuel dense R+2 / 96m² / 10m / ancien / pierre", "color": "#800000", "count": 4103, "file": "data/v3_cluster_13.geojson"}, "14": {"name": "Maison R+1 / 230m² / 5m / fin XXe / brique", "color": "#aaffc3", "count": 735, "file": "data/v3_cluster_14.geojson"}}}, "v4": {"title": "Clustering v4 — Bâti récent (≤10 ans)", "subtitle": "7k bâtiments (≥2016), KMeans k=10", "n_total": 7087, "clusters": {"0": {"name": "Maison R+1 / 91m² / 6m / 2017 / brique", "color": "#e6194b", "count": 1587, "file": "data/v4_cluster_0.geojson"}, "1": {"name": "Pavillon / 118m² / 3m / 2021 / brique", "color": "#3cb44b", "count": 1484, "file": "data/v4_cluster_1.geojson"}, "2": {"name": "Maison R+1 / 250m² / 5m / 2020", "color": "#ffe119", "count": 14, "file": "data/v4_cluster_2.geojson"}, "3": {"name": "Maison R+1 / 156m² / 6m / 2019 / brique", "color": "#4363d8", "count": 326, "file": "data/v4_cluster_3.geojson"}, "4": {"name": "Maison R+1 / 84m² / 6m / 2021 / brique", "color": "#f58231", "count": 875, "file": "data/v4_cluster_4.geojson"}, "5": {"name": "Maison R+1 / 74m² / 6m / 2019 / béton", "color": "#911eb4", "count": 772, "file": "data/v4_cluster_5.geojson"}, "6": {"name": "Grande maison / 449m² / 4m / 2019 / brique", "color": "#42d4f4", "count": 6, "file": "data/v4_cluster_6.geojson"}, "7": {"name": "Pavillon / 151m² / 4m / 2017 / brique", "color": "#f032e6", "count": 1292, "file": "data/v4_cluster_7.geojson"}, "8": {"name": "Maison R+1 / 94m² / 6m / 2019 / brique", "color": "#bfef45", "count": 572, "file": "data/v4_cluster_8.geojson"}, "9": {"name": "Pavillon / 162m² / 4m / 2020 / brique", "color": "#fabed4", "count": 159, "file": "data/v4_cluster_9.geojson"}}}};

// ── Map ──
const canvasRenderer = L.canvas({ padding: 0.5, tolerance: 5 });
const map = L.map('map', {
    center: [44.8378, -0.5792], zoom: 12,
    preferCanvas: true, renderer: canvasRenderer
});

// ── Basemaps ──
const basemaps = {
    'Google Satellite': L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 21, attribution: '&copy; Google'
    }),
    'Google Hybrid': L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 21, attribution: '&copy; Google'
    }),
    'OpenStreetMap': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19, attribution: '&copy; OpenStreetMap'
    }),
    'CartoDB Positron': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png', {
        maxZoom: 20, attribution: '&copy; CartoDB', subdomains: 'abcd'
    }),
    'Aucun (blanc)': null
};
let currentBasemap = basemaps['Google Hybrid'];
currentBasemap.addTo(map);

const bmContainer = document.getElementById('basemap-controls');
Object.keys(basemaps).forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'basemap-option';
    const checked = name === 'Google Hybrid' ? 'checked' : '';
    div.innerHTML = `<input type="radio" name="basemap" id="bm_${i}" value="${name}" ${checked}>
        <label for="bm_${i}">${name}</label>`;
    div.querySelector('input').addEventListener('change', () => {
        if (currentBasemap) map.removeLayer(currentBasemap);
        currentBasemap = basemaps[name];
        if (currentBasemap) currentBasemap.addTo(map);
    });
    bmContainer.appendChild(div);
});

// ── State ──
let activeVersion = null;
const loadedLayers = {};  // { versionKey: { clId: L.geoJSON } }
const loadedData = {};    // { versionKey: true } — tracks if fully loaded

// ── Popup ──
function formatPopup(props, clId, vKey) {
    const meta = VERSIONS[vKey].clusters[clId];
    let html = `<div style="font-family:sans-serif;font-size:13px;min-width:200px;">`;
    html += `<div style="background:${meta.color};color:white;padding:6px 10px;margin:-1px -1px 8px;border-radius:4px 4px 0 0;font-weight:bold;">`;
    html += `Cluster ${clId} — ${meta.name}</div>`;
    html += `<table style="width:100%;border-collapse:collapse;">`;
    const rows = [
        ['Surface', props.surface_bat != null ? Number(props.surface_bat).toFixed(0) + ' m²' : '—'],
        ['Hauteur', props.hauteur_mean != null ? Number(props.hauteur_mean).toFixed(1) + ' m' : '—'],
        ['Niveaux', props.nb_niveaux != null ? Math.round(props.nb_niveaux) : '—'],
        ['Année', props.annee_construction != null && props.annee_construction > 0 ? Math.round(props.annee_construction) : '—'],
        ['Usage', props.usage_principal || '—'],
        ['Matériau murs', props.mat_murs || '—'],
    ];
    rows.forEach(([k, v]) => {
        html += `<tr><td style="padding:2px 6px;color:#666;white-space:nowrap;">${k}</td>
                     <td style="padding:2px 6px;font-weight:500;">${v}</td></tr>`;
    });
    html += '</table></div>';
    return html;
}

// ── Load a version ──
async function loadVersion(vKey) {
    if (loadedData[vKey]) return;

    const version = VERSIONS[vKey];
    const clusters = version.clusters;
    const ids = Object.keys(clusters).sort((a, b) => a - b);
    const total = ids.length;
    let loaded = 0;

    const loadingEl = document.getElementById('loading');
    const progressEl = document.getElementById('progress');
    const loadFill = document.getElementById('load-fill');
    loadingEl.style.display = 'block';
    progressEl.textContent = `0/${total}`;
    loadFill.style.width = '0%';

    loadedLayers[vKey] = {};

    for (let i = 0; i < ids.length; i += 2) {
        const batch = ids.slice(i, i + 2);
        await Promise.all(batch.map(async (clId) => {
            const meta = clusters[clId];
            try {
                const resp = await fetch(meta.file);
                const geojson = await resp.json();
                const layer = L.geoJSON(geojson, {
                    renderer: canvasRenderer,
                    style: () => ({
                        fillColor: meta.color,
                        color: '#000000',
                        weight: 0.8,
                        fillOpacity: 1.0,
                    }),
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(() => formatPopup(feature.properties, clId, vKey), { maxWidth: 300 });
                    }
                });
                loadedLayers[vKey][clId] = layer;
            } catch (e) {
                console.error(`Erreur ${vKey} cluster ${clId}:`, e);
            }
            loaded++;
            progressEl.textContent = `${loaded}/${total}`;
            loadFill.style.width = `${(loaded / total * 100).toFixed(0)}%`;
        }));
    }

    loadedData[vKey] = true;
    setTimeout(() => { loadingEl.style.display = 'none'; }, 300);
}

// ── Switch version ──
async function switchVersion(vKey) {
    // Hide current layers
    if (activeVersion && loadedLayers[activeVersion]) {
        Object.values(loadedLayers[activeVersion]).forEach(layer => map.removeLayer(layer));
    }

    activeVersion = vKey;

    // Update tabs
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.version === vKey);
    });

    // Update subtitle
    document.getElementById('version-subtitle').textContent = VERSIONS[vKey].subtitle;

    // Load if needed
    await loadVersion(vKey);

    // Show layers & rebuild controls
    const clusters = VERSIONS[vKey].clusters;
    const ids = Object.keys(clusters).sort((a, b) => a - b);
    const n_total = ids.reduce((sum, id) => sum + clusters[id].count, 0);

    document.getElementById('clusters-title').textContent =
        `Clusters (${n_total.toLocaleString('fr-FR')} bâtiments)`;

    const ccContainer = document.getElementById('cluster-controls');
    ccContainer.innerHTML = '';

    ids.forEach(clId => {
        const meta = clusters[clId];
        const layer = loadedLayers[vKey][clId];
        if (layer) layer.addTo(map);

        const div = document.createElement('div');
        div.className = 'cluster-option';
        div.innerHTML = `
            <input type="checkbox" id="cl_${vKey}_${clId}" checked>
            <div class="cluster-swatch" style="background:${meta.color};"></div>
            <div>
                <span class="cluster-label">${clId}: ${meta.name}</span><br>
                <span class="cluster-count">${meta.count.toLocaleString('fr-FR')} bât.</span>
            </div>`;
        div.querySelector('input').addEventListener('change', (e) => {
            if (layer) {
                if (e.target.checked) map.addLayer(layer);
                else map.removeLayer(layer);
            }
        });
        ccContainer.appendChild(div);
    });
}

function toggleAll(show) {
    if (!activeVersion || !loadedLayers[activeVersion]) return;
    const clusters = VERSIONS[activeVersion].clusters;
    Object.keys(clusters).forEach(clId => {
        const cb = document.getElementById(`cl_${activeVersion}_${clId}`);
        if (cb) cb.checked = show;
        const layer = loadedLayers[activeVersion][clId];
        if (layer) {
            if (show) map.addLayer(layer);
            else map.removeLayer(layer);
        }
    });
}

// ── Build tabs ──
const tabsContainer = document.getElementById('tabs');
Object.keys(VERSIONS).forEach(vKey => {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.version = vKey;
    tab.textContent = VERSIONS[vKey].title;
    tab.addEventListener('click', () => switchVersion(vKey));
    tabsContainer.appendChild(tab);
});

// ── Panel toggle ──
const panelBody = document.getElementById('panel-body');
const toggleIcon = document.getElementById('toggle-icon');
document.getElementById('panel-header').addEventListener('click', () => {
    const hidden = panelBody.style.display === 'none';
    panelBody.style.display = hidden ? 'block' : 'none';
    toggleIcon.innerHTML = hidden ? '&#9660;' : '&#9654;';
});

// ── Start with first version ──
switchVersion(Object.keys(VERSIONS)[0]);
</script>
</body>
</html>
